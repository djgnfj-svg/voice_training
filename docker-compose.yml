name: voice_training

services:
  # ══════════ Dev (port 81) ══════════
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "81:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: development
    expose:
      - "3000"
    env_file:
      - ./frontend/.env
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    expose:
      - "8000"
    env_file:
      - ./backend/.env
    environment:
      - TTS_SERVICE_URL=http://tts:8080
      - ENVIRONMENT=development
    volumes:
      - ./backend:/app
      - audio-storage:/app/.audio-storage
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      - tts
    restart: unless-stopped

  tts:
    build:
      context: ./tts
    expose:
      - "8080"
    env_file:
      - ./backend/.env
    restart: unless-stopped

volumes:
  audio-storage:
