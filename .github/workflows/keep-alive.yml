name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 0 */5 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -sf "$SUPABASE_HEALTH_URL" > /dev/null
          echo "Supabase pinged at $(date)"
        env:
          SUPABASE_HEALTH_URL: ${{ secrets.SUPABASE_HEALTH_URL }}
