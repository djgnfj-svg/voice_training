name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Generate Prisma client
        run: cd frontend && npx prisma generate

      - name: Lint
        run: cd frontend && npm run lint

      - name: Type check
        run: cd frontend && npm run type-check

      - name: Build
        run: cd frontend && npm run build
        env:
          SKIP_ENV_VALIDATION: '1'
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          DIRECT_URL: postgresql://dummy:dummy@localhost:5432/dummy
          NEXTAUTH_SECRET: ci-dummy-secret
          NEXTAUTH_URL: http://localhost:81
          AUTH_TRUST_HOST: 'true'
          AUTH_GOOGLE_ID: dummy.apps.googleusercontent.com
          AUTH_GOOGLE_SECRET: dummy-secret
          BACKEND_URL: http://localhost:8000
          # 빌드 타임에 클라이언트 번들로 인라인되는 NEXT_PUBLIC_* 변수.
          # 프로덕션은 루트 .env의 값을 docker-compose args로 주입하지만,
          # CI는 실제 값이 없어도 빌드 경로가 통과하도록 빈 값을 명시.
          NEXT_PUBLIC_ADMIN_EMAILS: ''

      # Backend validation
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: cd backend && pip install --no-cache-dir .

      - name: Backend smoke test
        run: cd backend && python -c "from app.main import app; print('Backend import OK')"
