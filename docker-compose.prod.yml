name: voiceprep-prod

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "82:80"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: production
      args:
        NEXT_PUBLIC_ADMIN_EMAILS: ${NEXT_PUBLIC_ADMIN_EMAILS:-}
        NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID:-}
    expose:
      - "3000"
    env_file:
      - ./.env
    environment:
      - BACKEND_URL=http://backend:8000
      - NODE_ENV=production
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    expose:
      - "8000"
    env_file:
      - ./.env
    environment:
      - TTS_SERVICE_URL=http://tts:8080
      - ENVIRONMENT=production
    volumes:
      - audio-storage:/app/.audio-storage
    depends_on:
      - tts
    restart: unless-stopped

  tts:
    build:
      context: ./tts
    expose:
      - "8080"
    env_file:
      - ./.env
    restart: unless-stopped

volumes:
  audio-storage:
