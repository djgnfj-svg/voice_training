services:
  nginx:
    build:
      context: ./nginx
    ports:
      - "80:80"
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      target: production
    expose:
      - "3000"
    env_file:
      - ./frontend/.env.production
    environment:
      - NODE_ENV=production
      - BACKEND_URL=http://backend:8000
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
    expose:
      - "8000"
    env_file:
      - ./backend/.env.production
    environment:
      - ENVIRONMENT=production
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
